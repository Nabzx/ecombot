# AgentOps local development stack.
#   docker compose up --build
#     frontend -> http://localhost:3000
#     backend  -> http://localhost:8000  (docs at /docs)
#     db       -> PostgreSQL + pgvector (published on 5432 for local tooling)
#
# Values come from the root .env (copy from .env.example first).

name: agentops

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Host port 5433 avoids clashing with any local Postgres already on 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build: ./backend
    env_file: .env
    # DATABASE_URL in .env points at the `db` service hostname on the compose network.
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # Bind mount source for hot reload. The dependency virtualenv lives at /opt/venv
      # (outside /app), so it is not shadowed by this mount.
      - ./backend:/app
      # Synthetic policy/data files live at the repo root; make them available for
      # seeding (read-only).
      - ./data:/app/data:ro
      # Evaluation datasets (read) and reports (written by the eval runner).
      - ./evaluations:/app/evaluations
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s

  worker:
    # The durable outbox worker. Reuses the backend image; no HTTP server, no port.
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      # Wait for the backend to have applied migrations so the worker never races Alembic.
      backend:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./data:/app/data:ro
      - ./evaluations:/app/evaluations
    environment:
      # A distinct worker identity so its logs are easy to attribute.
      WORKER_ID: docker-outbox-worker-1
    command: ["python", "-m", "app.outbox.worker"]
    # Graceful shutdown: the worker traps SIGTERM and drains the current tick.
    stop_grace_period: 15s
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      # Preserve the image's installed dependencies and build cache against the mount.
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command: sh -c "npm run dev -- --hostname 0.0.0.0 --port 3000"

volumes:
  pgdata:
  frontend_node_modules:
  frontend_next:
