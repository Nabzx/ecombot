name: CI

on:
  push:
    branches: [main]
  pull_request:

# No paid APIs, hosted models, Ollama or private credentials are used anywhere here.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Ruff lint
        run: uv run ruff check .

      - name: MyPy
        run: uv run mypy .

      - name: Pytest
        run: uv run pytest

  frontend:
    name: Frontend (eslint, tsc, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Production build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

  integration:
    name: Integration (migrations + db readiness)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql+asyncpg://agentops:agentops@localhost:5432/agentops
      JWT_SECRET: ci-only-secret
    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agentops
          POSTGRES_USER: agentops
          POSTGRES_PASSWORD: agentops
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentops -d agentops"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Verify database readiness and pgvector extension
        run: |
          uv run python - <<'PY'
          import asyncio
          from sqlalchemy import text
          from app.db.session import check_database_connection, get_engine

          async def main() -> None:
              assert await check_database_connection(), "readiness check failed"
              engine = get_engine()
              async with engine.connect() as conn:
                  result = await conn.execute(
                      text("SELECT 1 FROM pg_extension WHERE extname = 'vector'")
                  )
                  assert result.scalar() == 1, "pgvector extension not enabled"
              print("database ready and pgvector enabled")

          asyncio.run(main())
          PY
